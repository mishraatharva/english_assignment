<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Summarizer</title>

    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🎙 Audio Summarizer</h1>

            <p>
                Upload an audio file and get an AI-generated summary.
            </p>

            <form action="/" method="post" enctype="multipart/form-data">

                <input type="file" name="audio" accept=".mp3,.wav,.m4a,.aac" required>

                <button type="submit">
                    Generate Summary
                </button>

            </form>

        </div>

        {% if summary %}

        <div class="summary-card">

            <h2>Generated Summary</h2>

            <pre>{{ summary }}</pre>

        </div>

        {% endif %}

    </div>

</body>

</html>
